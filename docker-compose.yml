version: "3.9"

services:
  backend:
    build: ./api
    container_name: amazon-backend
    ports:
      - "5000:5000"
    env_file:
      - ./api/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: amazon-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: amazon-db
    restart: always
    environment:
      POSTGRES_DB: selenium_based_full_stack_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: